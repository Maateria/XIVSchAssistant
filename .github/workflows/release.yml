name: Release

on:
  push:
    tags:
      - 'v*'

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download Dalamud
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile latest.zip
          Expand-Archive -Force latest.zip "$env:AppData\XIVLauncher\addon\Hooks\dev"

      - name: Build
        run: dotnet build -c Release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: bin/Release/XIVSchAssitant/latest.zip
          body: |
            **Work in progress** — XIVSchAssitant

            Assistant automatique pour l'Érudit (Scholar) dans FFXIV :
            - Invocation et repositionnement automatique d'Eos au centre de l'arène
            - Ré-invocation après wipe global (pas sur rez manuelle)
            - Alerte sonore quand Biolysis tombe
            - Compte à rebours visuel pour Chain Stratagem
            - Compatible EN / FR / DE / JP

            ### Installation via dépôt personnalisé Dalamud
            1. `/xlsettings` → Experimental → Custom Plugin Repositories
            2. Ajouter : `https://raw.githubusercontent.com/Maateria/XIVSchAssistant/main/repo.json`
            3. Rechercher "XIVSchAssitant" dans `/xlplugins`
